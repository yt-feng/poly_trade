name: Build all monthly_runs CLOB robust optimization

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'analysis/all_monthly_clob_robust_optimization.py'
      - '.github/workflows/run-all-monthly-clob-robust-optimization.yml'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  build-all-monthly-clob-robust-optimization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout poly_trade
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: yt-feng/poly
          path: source_poly
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show monthly_runs directory
        run: |
          pwd
          ls -la source_poly/data/monthly_runs || true
          find source_poly/data/monthly_runs -maxdepth 2 -type f | head -n 200 || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run robust optimization research
        run: |
          set -euxo pipefail
          python analysis/all_monthly_clob_robust_optimization.py \
            --source-root source_poly/data/monthly_runs \
            --report-dir reports/all_monthly_runs_clob_robust_optimization \
            --fee 0.01

      - name: Show generated outputs
        if: always()
        run: |
          find reports/all_monthly_runs_clob_robust_optimization -maxdepth 4 -type f | sort || true

      - name: Publish workflow summary
        if: always()
        run: |
          echo '## All monthly_runs CLOB robust optimization' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Source root: `source_poly/data/monthly_runs`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Report dir: `reports/all_monthly_runs_clob_robust_optimization/`' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/all_monthly_runs_clob_robust_optimization/all_monthly_clob_robust_report.md ]; then
            cat reports/all_monthly_runs_clob_robust_optimization/all_monthly_clob_robust_report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-monthly-runs-clob-robust-optimization-${{ github.run_id }}
          path: |
            reports/all_monthly_runs_clob_robust_optimization
          if-no-files-found: warn

      - name: Commit outputs back to repo
        if: success()
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A reports/all_monthly_runs_clob_robust_optimization
          if ! git diff --cached --quiet; then
            git commit -m 'Update all monthly_runs CLOB robust optimization outputs [skip ci]'
            git pull --rebase origin main || true
            git push origin HEAD:main
          else
            echo 'No output changes to commit.'
          fi
