name: Build and commit first-2-minute predictive research

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'analysis/build_run_24869603988_dataset.py'
      - 'analysis/build_run_24869603988_deepdive.py'
      - 'analysis/build_run_24869603988_bankroll.py'
      - 'analysis/optimize_run_24869603988_bankroll.py'
      - 'analysis/classic_run_24869603988_strategies.py'
      - 'analysis/extended_classic_run_24869603988.py'
      - '.github/workflows/run-24869603988-analysis.yml'
      - 'requirements.txt'
      - 'README.md'

permissions:
  contents: write

jobs:
  build-clean-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout poly_trade
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: yt-feng/poly
          path: source_poly
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show source directory
        run: |
          pwd
          ls -la
          ls -la source_poly
          ls -la source_poly/data
          ls -la source_poly/data/runs
          ls -la source_poly/data/runs/24869603988_attempt1 | head -n 200

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bankroll research build
        run: |
          set -euxo pipefail
          python analysis/build_run_24869603988_bankroll.py \
            --source-dir source_poly/data/runs/24869603988_attempt1 \
            --cleaned-dir data/cleaned/run_24869603988_attempt1 \
            --features-dir data/features/run_24869603988_attempt1 \
            --report-dir reports/run_24869603988_attempt1_predictive \
            --fee 0.01

      - name: Run optimization layer
        run: |
          set -euxo pipefail
          python analysis/optimize_run_24869603988_bankroll.py \
            --features-file data/features/run_24869603988_attempt1/market_features_first2m.csv \
            --report-dir reports/run_24869603988_attempt1_predictive \
            --fee 0.01

      - name: Run classic strategy layer
        run: |
          set -euxo pipefail
          python analysis/classic_run_24869603988_strategies.py \
            --features-file data/features/run_24869603988_attempt1/market_features_first2m.csv \
            --report-dir reports/run_24869603988_attempt1_predictive \
            --fee 0.01

      - name: Run extended classic strategy layer
        run: |
          set -euxo pipefail
          python analysis/extended_classic_run_24869603988.py \
            --features-file data/features/run_24869603988_attempt1/market_features_first2m.csv \
            --quotes-file data/cleaned/run_24869603988_attempt1/btc_updown_5m_quotes_clean.csv \
            --report-dir reports/run_24869603988_attempt1_predictive \
            --fee 0.01

      - name: Show generated outputs
        if: always()
        run: |
          pwd
          find data -maxdepth 4 -type f | sort || true
          find reports -maxdepth 4 -type f | sort || true

      - name: Publish workflow summary
        if: always()
        run: |
          echo '## First-2-minute predictive research (bankroll + optimizer + classic + extended classic)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Source repo: `yt-feng/poly`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Source subdir: `data/runs/24869603988_attempt1`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Cleaned quotes: `data/cleaned/run_24869603988_attempt1/btc_updown_5m_quotes_clean.csv`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Feature table: `data/features/run_24869603988_attempt1/market_features_first2m.csv`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Report dir: `reports/run_24869603988_attempt1_predictive/`' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/run_24869603988_attempt1_predictive/report.md ]; then
            cat reports/run_24869603988_attempt1_predictive/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/run_24869603988_attempt1_predictive/optimization_report.md ]; then
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '---' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            cat reports/run_24869603988_attempt1_predictive/optimization_report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/run_24869603988_attempt1_predictive/classic_strategies_report.md ]; then
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '---' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            cat reports/run_24869603988_attempt1_predictive/classic_strategies_report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/run_24869603988_attempt1_predictive/extended_classic_report.md ]; then
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '---' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            cat reports/run_24869603988_attempt1_predictive/extended_classic_report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-24869603988-predictive-research-${{ github.run_id }}
          path: |
            data/cleaned/run_24869603988_attempt1
            data/features/run_24869603988_attempt1
            reports/run_24869603988_attempt1_predictive
          if-no-files-found: warn

      - name: Commit outputs back to repo
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/cleaned/run_24869603988_attempt1 data/features/run_24869603988_attempt1 reports/run_24869603988_attempt1_predictive
          if ! git diff --cached --quiet; then
            git commit -m 'Update bankroll, optimizer, classic, and extended classic outputs for run 24869603988_attempt1 [skip ci]'
            git push
          else
            echo 'No output changes to commit.'
          fi
